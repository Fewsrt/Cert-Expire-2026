---
# Not a Windows guest issue: "No module named winrm" = install pywinrm on the Ansible controller
# (see ansible/install_controller_deps.sh). WinRM is used only from the controller.
#
# Linux package install is OFF by default (group_vars or -e). Assessment uses sbverify/pesign if already on the guest.
# Opt in to repo/CRB/EPEL install during the same run:
#   -e secureboot_install_sbsigntools=true
# RHEL — EPEL (optional, security review):
#   -e secureboot_install_epel_for_sbsigntools=true

# Preflight is informational only; assessment tasks handle unreachable/auth failures directly.
- name: Preflight — ICMP, WinRM, SSH
  hosts: localhost
  gather_facts: false
  vars:
    _targets: "{{ (groups['windows'] | default([])) + (groups['linux'] | default([])) }}"
    _win_hosts: "{{ groups['windows'] | default([]) }}"
    _lin_hosts: "{{ groups['linux'] | default([]) }}"
  tasks:
    - name: Layer 3 ICMP to ansible_host (informational; many sites block ICMP while WinRM/SSH still works)
      ansible.builtin.command:
        argv:
          - ping
          - -c
          - "2"
          - -W
          - "2"
          - "{{ hostvars[item].ansible_host | default(item) }}"
      loop: "{{ _targets }}"
      register: secureboot_icmp_reg
      ignore_errors: true
      changed_when: false

    - name: WinRM probe each Windows guest (requires pywinrm on controller)
      ansible.windows.win_ping:
      loop: "{{ _win_hosts }}"
      loop_control:
        label: "{{ item }}"
      delegate_to: "{{ item }}"
      register: secureboot_winrm_reg
      ignore_unreachable: true
      ignore_errors: true

    - name: SSH probe each Linux guest
      ansible.builtin.ping:
      loop: "{{ _lin_hosts }}"
      loop_control:
        label: "{{ item }}"
      delegate_to: "{{ item }}"
      register: secureboot_ssh_reg
      ignore_unreachable: true
      ignore_errors: true

- name: Optional — install sbsigntools on Linux (off by default; see group_vars all.yml)
  hosts: linux
  gather_facts: "{{ secureboot_install_sbsigntools | default(false) | bool }}"
  become: true
  ignore_unreachable: true
  become_method: "{{ 'su' if (inventory_hostname | lower | regex_search('^sle')) else 'sudo' }}"
  tasks:
    - name: Install sbsigntools when secureboot_install_sbsigntools is true
      when: secureboot_install_sbsigntools | default(false) | bool
      block:
        - ansible.builtin.include_tasks: tasks/install_sbsigntools_linux_tasks.yml
      rescue:
        - name: Record sbsigntools install failure
          ansible.builtin.set_fact:
            secureboot_pkg_failed: true
            secureboot_pkg_msg: "{{ ansible_failed_result.msg | default('include_tasks failed') | string | truncate(2000) }}"
            secureboot_assessment:
              os_family: linux
              secure_boot_enabled: ""
              db_has_2011: ""
              db_has_2023: ""
              kek_has_2023: ""
              dbx_readable: ""
              active_bootloader_file: ""
              active_bootloader_has_2011: ""
              active_bootloader_has_2023: ""
              active_bootloader_signature_method: ""

# Windows: Get-SecureBootUEFI for NVRAM vars; bootmgfw chain via Get-AuthenticodeSignature + X509Chain.
# See docs/18-ansible-secureboot-ca-assessment.md — Get-AuthenticodeSignature may prefer catalog over embedded sigs.
- name: Assess Windows Secure Boot CA state
  hosts: windows
  gather_facts: false
  ignore_unreachable: true
  tasks:
    - name: Guest Secure Boot assessment via WinRM
      block:
        - name: Collect Windows Secure Boot DB and bootloader CA evidence
          ansible.windows.win_shell:
            cmd: |
              $ErrorActionPreference = "Continue"
    
              function Get-FlagText {
                param([string]$Text)
                [PSCustomObject]@{
                  has_2011 = [bool]($Text -match "2011|Windows Production PCA|Microsoft Corporation UEFI CA 2011|Microsoft Corporation KEK CA 2011")
                  has_2023 = [bool]($Text -match "2023|Windows UEFI CA 2023|Microsoft UEFI CA 2023|Microsoft Corporation KEK 2K CA 2023")
                  has_kek_2023 = [bool]($Text -match "Microsoft Corporation KEK 2K CA 2023")
                  has_windows_uefi_ca_2023 = [bool]($Text -match "Windows UEFI CA 2023")
                  has_ms_uefi_ca_2023 = [bool]($Text -match "Microsoft UEFI CA 2023")
                  has_option_rom_2023 = [bool]($Text -match "Microsoft Option ROM UEFI CA 2023")
                }
              }
    
              function Get-SbVarSummary {
                param([string]$Name)
                $var = Get-SecureBootUEFI -Name $Name -ErrorAction SilentlyContinue
                if (-not $var) {
                  return [PSCustomObject]@{
                    name = $Name
                    readable = $false
                    bytes = 0
                    has_2011 = $false
                    has_2023 = $false
                    has_kek_2023 = $false
                    has_windows_uefi_ca_2023 = $false
                    has_ms_uefi_ca_2023 = $false
                    has_option_rom_2023 = $false
                  }
                }
    
                $text = [System.Text.Encoding]::ASCII.GetString($var.Bytes)
                $flags = Get-FlagText -Text $text
                return [PSCustomObject]@{
                  name = $Name
                  readable = $true
                  bytes = $var.Bytes.Length
                  has_2011 = $flags.has_2011
                  has_2023 = $flags.has_2023
                  has_kek_2023 = $flags.has_kek_2023
                  has_windows_uefi_ca_2023 = $flags.has_windows_uefi_ca_2023
                  has_ms_uefi_ca_2023 = $flags.has_ms_uefi_ca_2023
                  has_option_rom_2023 = $flags.has_option_rom_2023
                }
              }
    
              function Get-CertChainSummary {
              param([string]$Path)
              if (-not (Test-Path $Path)) {
                return [PSCustomObject]@{
                  path = $Path
                  exists = $false
                  signature_status = ""
                  has_2011 = $false
                  has_2023 = $false
                  chain = @()
                }
              }
    
              $sig = Get-AuthenticodeSignature $Path
              $cert = $sig.SignerCertificate
              $chainItems = @()
              $has2011 = $false
              $has2023 = $false
    
              if ($cert) {
                $chain = New-Object System.Security.Cryptography.X509Certificates.X509Chain
                $chain.ChainPolicy.RevocationMode = [System.Security.Cryptography.X509Certificates.X509RevocationMode]::NoCheck
                $chain.Build($cert) | Out-Null
                $index = 0
                foreach ($element in $chain.ChainElements) {
                  $text = $element.Certificate.Subject + " " + $element.Certificate.Issuer
                  $uses2011 = [bool]($text -match "2011|Windows Production PCA")
                  $uses2023 = [bool]($text -match "2023|Windows UEFI CA")
                  $has2011 = $has2011 -or $uses2011
                  $has2023 = $has2023 -or $uses2023
                  $chainItems += [PSCustomObject]@{
                    index = $index
                    subject = $element.Certificate.Subject
                    issuer = $element.Certificate.Issuer
                    not_after = $element.Certificate.NotAfter.ToString("o")
                    uses_2011 = $uses2011
                    uses_2023 = $uses2023
                  }
                  $index += 1
                }
              }
    
              return [PSCustomObject]@{
                path = $Path
                exists = $true
                signature_status = [string]$sig.Status
                has_2011 = $has2011
                has_2023 = $has2023
                chain = $chainItems
              }
              }
    
              $secureBoot = $null
              try { $secureBoot = [bool](Confirm-SecureBootUEFI) } catch { $secureBoot = $false }
    
              $vars = @{}
              foreach ($name in "PK","KEK","db","dbx") {
              $vars[$name] = Get-SbVarSummary -Name $name
              }
    
              $espDrive = $null
              foreach ($letter in "Z","Y","X","W","V") {
              if (-not (Test-Path "$letter`:\")) {
                $espDrive = "$letter`:"
                break
              }
              }
    
              $espMounted = $false
              $activeBootloader = $null
              if ($espDrive) {
              mountvol $espDrive /S | Out-Null
              if (Test-Path "$espDrive\EFI\Microsoft\Boot\bootmgfw.efi") {
                $activeBootloader = "$espDrive\EFI\Microsoft\Boot\bootmgfw.efi"
                $espMounted = $true
              }
              }
    
              $fallbackBootloader = "$env:SystemRoot\Boot\EFI\bootmgfw.efi"
              if (-not $activeBootloader -and (Test-Path $fallbackBootloader)) {
              $activeBootloader = $fallbackBootloader
              }
    
              $bootloaderSummary = if ($activeBootloader) {
              Get-CertChainSummary -Path $activeBootloader
              } else {
              [PSCustomObject]@{
                path = ""
                exists = $false
                signature_status = ""
                has_2011 = $false
                has_2023 = $false
                chain = @()
              }
              }
    
              $dbHas2023 = [bool]($vars["db"].has_windows_uefi_ca_2023 -or $vars["db"].has_ms_uefi_ca_2023)
              $kekHas2023 = [bool]$vars["KEK"].has_kek_2023
              if ($espMounted -and $espDrive) {
              mountvol $espDrive /D | Out-Null
              }
    
              [PSCustomObject]@{
              os_family = "windows"
              secure_boot_enabled = $secureBoot
              db_has_2011 = [bool]$vars["db"].has_2011
              db_has_2023 = $dbHas2023
              kek_has_2023 = $kekHas2023
              dbx_readable = [bool]$vars["dbx"].readable
              active_bootloader_file = [string]$bootloaderSummary.path
              active_bootloader_has_2011 = [bool]$bootloaderSummary.has_2011
              active_bootloader_has_2023 = [bool]$bootloaderSummary.has_2023
              active_bootloader_signature_method = "windows_authenticode"
              } | ConvertTo-Json -Depth 8 -Compress
          register: windows_assessment_raw
          changed_when: false

        - name: Store Windows assessment fact
          ansible.builtin.set_fact:
            secureboot_assessment: "{{ windows_assessment_raw.stdout | from_json }}"
      rescue:
        - name: Record Windows assessment exception
          ansible.builtin.set_fact:
            secureboot_assessment:
              os_family: windows
              secure_boot_enabled: ""
              db_has_2011: ""
              db_has_2023: ""
              kek_has_2023: ""
              dbx_readable: ""
              active_bootloader_file: ""
              active_bootloader_has_2011: ""
              active_bootloader_has_2023: ""
              active_bootloader_signature_method: ""

# Linux: mokutil + sbverify --list (from sbsigntools package only). See docs/18.
- name: Assess Linux Secure Boot CA state
  hosts: linux
  gather_facts: false
  become: true
  ignore_unreachable: true
  # SLES minimal images often lack sudo (use su + root password). Ubuntu/RHEL typically use sudo.
  become_method: "{{ 'su' if (inventory_hostname | lower | regex_search('^sle')) else 'sudo' }}"
  tasks:
    - name: Guest Secure Boot assessment via SSH
      when: not (secureboot_pkg_failed | default(false))
      block:
        - name: Collect Linux Secure Boot DB and bootloader CA evidence
          ansible.builtin.shell:
            executable: /bin/sh
            cmd: |
                set +e
                python3 - <<'PY'
                import glob
                import json
                import os
                import re
                import subprocess
                import sys
      
                def run(cmd):
                  kw = {"shell": True, "stdout": subprocess.PIPE, "stderr": subprocess.STDOUT}
                  if sys.version_info >= (3, 7):
                    kw["text"] = True
                  else:
                    kw["universal_newlines"] = True
                  proc = subprocess.run(cmd, **kw)
                  out = proc.stdout
                  return (out or "").strip()
      
                def run_rc(cmd):
                  """Return (exit_code, combined stdout+stderr text) for sbverify etc."""
                  kw = {"shell": True, "stdout": subprocess.PIPE, "stderr": subprocess.STDOUT}
                  if sys.version_info >= (3, 7):
                    kw["text"] = True
                  else:
                    kw["universal_newlines"] = True
                  proc = subprocess.run(cmd, **kw)
                  return proc.returncode, (proc.stdout or "").strip()
      
                def has(pattern, text):
                  return bool(re.search(pattern, text or "", re.I))
      
                def _mokutil_summary_line(line):
                  s = line.strip()
                  return (
                      s.startswith("[key")
                      or s.startswith("Owner:")
                      or s.startswith("SHA1 Fingerprint:")
                      or s.startswith("Issuer:")
                      or s.startswith("Subject:")
                      or s.startswith("Not Before")
                      or s.startswith("Not After")
                  )
      
                def sb_var(name):
                  text = run(f"mokutil --{name} 2>&1")
                  return {
                      "name": name,
                      "readable": bool(text) and not has(r"not supported|failed|error", text),
                      "has_2011": has(r"2011|Windows Production PCA|Microsoft Corporation UEFI CA 2011|Microsoft Corporation KEK CA 2011", text),
                      "has_2023": has(r"2023|Windows UEFI CA 2023|Microsoft UEFI CA 2023|Microsoft Corporation KEK 2K CA 2023", text),
                      "has_kek_2023": has(r"Microsoft Corporation KEK 2K CA 2023", text),
                      "has_windows_uefi_ca_2023": has(r"Windows UEFI CA 2023", text),
                      "has_ms_uefi_ca_2023": has(r"Microsoft UEFI CA 2023", text),
                      "has_option_rom_2023": has(r"Microsoft Option ROM UEFI CA 2023", text),
                      "summary": "\\n".join(line for line in text.splitlines() if _mokutil_summary_line(line))[:12000],
                  }
      
                def _boot_current_hex(text):
                  for line in text.splitlines():
                      ls = line.strip()
                      if ls.lower().startswith("bootcurrent:"):
                          val = ls.split(":", 1)[1].strip()
                          if not val:
                              return ""
                          if val.lower().startswith("0x"):
                              val = val[2:]
                          try:
                              num = int(val, 16)
                          except ValueError:
                              try:
                                  num = int(val, 10)
                              except ValueError:
                                  return ""
                          return f"{num:04X}"
                  return ""
      
                def efi_esp_mount():
                  """Where the ESP is mounted (RHEL often /boot/efi; some images use /efi)."""
                  for trial in ("/boot/efi", "/efi"):
                    t = run(f"findmnt -nro TARGET --target {trial} 2>/dev/null").strip()
                    if not t:
                      t = trial
                    t = t.rstrip("/")
                    if os.path.isdir(os.path.join(t, "EFI")):
                      return t
                  return "/boot/efi"
      
                def _host_path_from_boot_description(desc, esp_root):
                  if not desc:
                    return ""
                  m = re.search(r"File\\(([^)]+)\\)", desc, re.I)
                  inner = m.group(1).strip() if m else ""
                  if not inner:
                    # RHEL/Fedora efibootmgr: HD(1,GPT,...)/\EFI\redhat\shimx64.efi (no File() wrapper)
                    m_hd = re.search(r"HD\\([^)]+\\)/(.+?\\.efi)", desc, re.I | re.S)
                    if m_hd:
                      inner = m_hd.group(1).strip()
                  if not inner:
                    m2 = re.search(r"([\\/]EFI[\\/].+\.efi)", desc, re.I)
                    inner = (m2.group(1).strip() if m2 else "")
                  if not inner:
                    m3 = re.search(r"EFI[\\/].+\.efi", desc, re.I)
                    inner = (m3.group(0).strip() if m3 else "")
                  if not inner:
                    return ""
                  inner = inner.replace(chr(92), "/")
                  if not inner.startswith("/"):
                    inner = "/" + inner.lstrip("/")
                  if inner.upper().startswith("/EFI"):
                    return esp_root + inner
                  if inner.upper().startswith("EFI/"):
                    return esp_root + "/" + inner
                  return ""
      
                def _first_bootorder_hex(text):
                  for line in text.splitlines():
                    ls = line.strip()
                    if not ls.lower().startswith("bootorder:"):
                      continue
                    rest = ls.split(":", 1)[1].strip()
                    if not rest:
                      return ""
                    first = rest.split(",")[0].strip()
                    val = first
                    if val.lower().startswith("0x"):
                      val = val[2:]
                    try:
                      num = int(val, 16)
                    except ValueError:
                      try:
                        num = int(val, 10)
                      except ValueError:
                        return ""
                    return f"{num:04X}"
                  return ""
      
                def _boot_entry_block(text, boot_hex):
                  """efibootmgr -v often wraps BootNNNN across lines; path may not be on the first line."""
                  lines = text.splitlines()
                  for i, line in enumerate(lines):
                    if not re.match(rf"^Boot{boot_hex}\\b", line.strip(), re.I):
                      continue
                    block_lines = [line]
                    for j in range(i + 1, len(lines)):
                      nxt = lines[j]
                      if re.match(r"^Boot[0-9A-F]{4}\\b", nxt.strip(), re.I):
                        break
                      block_lines.append(nxt)
                    return chr(10).join(block_lines)
                  return ""
      
                def _resolve_boot_entry(text, boot_hex, esp_root):
                  if not boot_hex:
                    return "", ""
                  block = _boot_entry_block(text, boot_hex)
                  if block:
                    host_path = _host_path_from_boot_description(block, esp_root)
                    if host_path:
                      return host_path, block
                  line_pat = re.compile(rf"^Boot{boot_hex}\\*?\\s+(.*)$", re.I)
                  for line in text.splitlines():
                    ls = line.strip()
                    m = line_pat.match(ls)
                    if not m:
                      continue
                    desc = m.group(1)
                    host_path = _host_path_from_boot_description(desc, esp_root)
                    if host_path:
                      return host_path, desc
                  return "", ""
      
                def active_efi_from_efibootmgr(text, esp_root):
                  seen = []
                  for hx in (_boot_current_hex(text), _first_bootorder_hex(text)):
                    if not hx or hx in seen:
                      continue
                    seen.append(hx)
                    hp, d = _resolve_boot_entry(text, hx, esp_root)
                    if hp:
                      return hp, d
                  return "", ""
      
                def fallback_efi_bootloader(esp_root):
                  patterns = [
                    f"{esp_root}/EFI/*/shimx64.efi",
                    f"{esp_root}/EFI/*/shim.efi",
                    f"{esp_root}/EFI/*/shimaa64.efi",
                  ]
                  sh = []
                  for pt in patterns:
                    sh.extend(glob.glob(pt))
                  sh = sorted({p for p in sh if os.path.isfile(p)})
                  if len(sh) == 1:
                      return sh[0], "fallback:single_shim_on_esp"
                  if len(sh) > 1:
                      for prefer in ("redhat", "centos", "fedora", "almalinux", "rocky", "eurolinux"):
                        for cand in sh:
                          if f"/EFI/{prefer}/" in cand.replace(chr(92), "/").lower():
                            return cand, f"fallback:preferred_vendor_{prefer}"
                      return sh[0], "fallback:first_shim_multi"
                  gr = sorted(
                    {p for p in glob.glob(f"{esp_root}/EFI/*/grubx64.efi") + glob.glob(f"{esp_root}/EFI/*/grubaa64.efi") if os.path.isfile(p)}
                  )
                  if not sh and len(gr) == 1:
                      return gr[0], "fallback:single_grub_on_esp"
                  if not sh and len(gr) > 1:
                      for prefer in ("redhat", "centos", "fedora"):
                        for cand in gr:
                          if f"/EFI/{prefer}/" in cand.replace(chr(92), "/").lower():
                            return cand, f"fallback:preferred_grub_{prefer}"
                      return gr[0], "fallback:first_grub_multi"
                  return "", ""
      
                def signature(path):
                  """PKCS#7 listing via sbverify (sbsigntools package) only — no heuristic binary scan."""
                  pat_2011 = r"2011|Windows Production PCA|Microsoft Corporation UEFI CA 2011|Microsoft Corporation KEK CA 2011"
                  pat_2023 = r"2023|Windows UEFI CA 2023|Microsoft UEFI CA 2023|Microsoft Corporation KEK 2K CA 2023|Option ROM UEFI CA 2023"
                  if not path or not os.path.exists(path):
                      return {"path": path, "exists": False, "has_2011": False, "has_2023": False, "text": "", "method": "none"}
                  if not os.access(path, os.R_OK):
                      return {"path": path, "exists": True, "has_2011": False, "has_2023": False, "text": "file not readable", "method": "unreadable"}
                  if not run("command -v sbverify"):
                      return {
                          "path": path,
                          "exists": True,
                          "has_2011": False,
                          "has_2023": False,
                          "text": "sbverify not on PATH; install distro package sbsigntools (or Debian/Ubuntu sbsigntool) so PKCS#7 can be listed.",
                          "method": "sbverify_not_installed",
                      }
                  rc, sb_out = run_rc(f"sbverify --list {json.dumps(path)} 2>&1")
                  h1 = bool(has(pat_2011, sb_out))
                  h3 = bool(has(pat_2023, sb_out))
                  if rc != 0:
                      method = "sbverify_failed"
                  else:
                      method = "sbverify"
                  text = ("=== sbverify --list (rc=%s) ===" % rc) + chr(10) + (sb_out or "")[:11500]
                  return {
                      "path": path,
                      "exists": True,
                      "has_2011": h1,
                      "has_2023": h3,
                      "text": text[:12000],
                      "method": method,
                  }
      
                esp = efi_esp_mount()
                sb_state = run("mokutil --sb-state 2>&1")
                efibootmgr = run("efibootmgr -v 2>&1")
                if not efibootmgr.strip() or "not supported" in efibootmgr.lower():
                  efibootmgr = run("efibootmgr 2>&1") + chr(10) + run("efibootmgr -v 2>&1")
                active_file, _active_raw = active_efi_from_efibootmgr(efibootmgr, esp)
                if not active_file:
                  active_file, _active_raw = fallback_efi_bootloader(esp)
                active_sig = signature(active_file)
                variables = {name: sb_var(name) for name in ["pk", "kek", "db", "dbx"]}
                db = variables["db"]
                kek = variables["kek"]
                dbx = variables["dbx"]
                secure_boot_enabled = has(r"enabled", sb_state)
                db_has_2023 = bool(db["has_windows_uefi_ca_2023"] or db["has_ms_uefi_ca_2023"])
    
                print(json.dumps({
                  "os_family": "linux",
                  "secure_boot_enabled": secure_boot_enabled,
                  "db_has_2011": bool(db["has_2011"]),
                  "db_has_2023": db_has_2023,
                  "kek_has_2023": bool(kek["has_kek_2023"]),
                  "dbx_readable": bool(dbx["readable"]),
                  "active_bootloader_file": active_file,
                  "active_bootloader_has_2011": bool(active_sig["has_2011"]),
                  "active_bootloader_has_2023": bool(active_sig["has_2023"]),
                  "active_bootloader_signature_method": active_sig.get("method", ""),
                }, separators=(",", ":")))
                PY
          register: linux_assessment_raw
          changed_when: false

        - name: Store Linux assessment fact
          ansible.builtin.set_fact:
            secureboot_assessment: "{{ linux_assessment_raw.stdout | from_json }}"
      rescue:
        - name: Record Linux assessment exception
          ansible.builtin.set_fact:
            secureboot_assessment:
              os_family: linux
              secure_boot_enabled: ""
              db_has_2011: ""
              db_has_2023: ""
              kek_has_2023: ""
              dbx_readable: ""
              active_bootloader_file: ""
              active_bootloader_has_2011: ""
              active_bootloader_has_2023: ""
              active_bootloader_signature_method: ""

- name: Write controller reports
  hosts: localhost
  gather_facts: false
  vars:
    report_dir: "{{ playbook_dir }}/../reports"
    report_json: "{{ report_dir }}/secureboot_ca_assessment.json"
    report_csv: "{{ report_dir }}/secureboot_ca_assessment.csv"
    _report_hosts: "{{ ((groups['windows'] | default([])) + (groups['linux'] | default([]))) | unique | sort }}"
  tasks:
    - name: Ensure report directory exists
      ansible.builtin.file:
        path: "{{ report_dir }}"
        state: directory
        mode: "0755"

    - name: Read ESXi version from vCenter with govc when inventory has vcenter_host
      ansible.builtin.shell: |
        set -o pipefail
        ESXI_HOST={{ hostvars[item].vcenter_host | default('') | quote }}
        if [ -z "$ESXI_HOST" ] || ! command -v govc >/dev/null 2>&1 || ! command -v jq >/dev/null 2>&1; then
          exit 0
        fi
        govc host.info -json "$ESXI_HOST" 2>/dev/null | jq -r '
          (.HostSystems[0]? // .hostSystems[0]? // {}) |
          (.Config.Product // .config.product // {}) as $p |
          ($p.FullName // $p.fullName // "") as $full |
          ($p.Version // $p.version // "") as $version |
          ($p.Build // $p.build // "") as $build |
          if ($full | length) > 0 then $full
          elif (($version | length) > 0 and ($build | length) > 0) then "ESXi \($version) build \($build)"
          elif ($version | length) > 0 then "ESXi \($version)"
          else "" end
        '
      args:
        executable: /bin/bash
      loop: "{{ _report_hosts }}"
      loop_control:
        label: "{{ item }}"
      register: esxi_version_probe
      changed_when: false
      failed_when: false
      when:
        - hostvars[item].vcenter_host | default('') | length > 0
        - hostvars[item].esxi_version | default('', true) | length == 0

    - name: Record ESXi version values read from vCenter
      ansible.builtin.set_fact:
        secureboot_esxi_versions: "{{ secureboot_esxi_versions | default({}) | combine({ item.item: item.stdout | trim }) }}"
      loop: "{{ esxi_version_probe.results | default([]) }}"
      loop_control:
        label: "{{ item.item | default('unknown') }}"
      when: item.stdout | default('') | trim | length > 0

    - name: Write JSON report
      ansible.builtin.copy:
        dest: "{{ report_json }}"
        mode: "0644"
        content: |
          [
          {% for host in _report_hosts %}
          {% set esxi_version = (hostvars[host].esxi_version | default('', true)) or ((secureboot_esxi_versions | default({})).get(host, '')) %}
          {% if hostvars[host].secureboot_assessment is defined %}
          {% set a = hostvars[host].secureboot_assessment %}
          {{ {'inventory_host': host, 'os_family': a.os_family | default(''), 'esxi_version': esxi_version, 'secure_boot_enabled': a.secure_boot_enabled | default(''), 'db_has_2011': a.db_has_2011 | default(''), 'db_has_2023': a.db_has_2023 | default(''), 'kek_has_2023': a.kek_has_2023 | default(''), 'dbx_readable': a.dbx_readable | default(''), 'active_bootloader_file': a.active_bootloader_file | default(''), 'active_bootloader_has_2011': a.active_bootloader_has_2011 | default(''), 'active_bootloader_has_2023': a.active_bootloader_has_2023 | default(''), 'active_bootloader_signature_method': a.active_bootloader_signature_method | default('')} | to_nice_json }}
          {% else %}
          {{ {'inventory_host': host, 'os_family': ('windows' if host in (groups['windows'] | default([])) else 'linux'), 'esxi_version': esxi_version, 'secure_boot_enabled': '', 'db_has_2011': '', 'db_has_2023': '', 'kek_has_2023': '', 'dbx_readable': '', 'active_bootloader_file': '', 'active_bootloader_has_2011': '', 'active_bootloader_has_2023': '', 'active_bootloader_signature_method': ''} | to_nice_json }}
          {% endif %}
          {% if not loop.last %},{% endif %}
          {% endfor %}
          ]

    - name: Write CSV report
      ansible.builtin.copy:
        dest: "{{ report_csv }}"
        mode: "0644"
        content: |
          inventory_host,os_family,esxi_version,secure_boot_enabled,db_has_2011,db_has_2023,kek_has_2023,dbx_readable,active_bootloader_file,active_bootloader_has_2011,active_bootloader_has_2023,active_bootloader_signature_method
          {% for host in _report_hosts %}
          {% set esxi_version = (hostvars[host].esxi_version | default('', true)) or ((secureboot_esxi_versions | default({})).get(host, '')) %}
          {% set a = hostvars[host].secureboot_assessment | default({}) %}
          {% if a %}
          {{ host }},{{ a.os_family | default('') }},"{{ esxi_version | replace('"', '""') }}",{{ a.secure_boot_enabled | default('') }},{{ a.db_has_2011 | default('') }},{{ a.db_has_2023 | default('') }},{{ a.kek_has_2023 | default('') }},{{ a.dbx_readable | default('') }},"{{ (a.active_bootloader_file | default('')) | replace('"', '""') }}",{{ a.active_bootloader_has_2011 | default('') }},{{ a.active_bootloader_has_2023 | default('') }},"{{ (a.active_bootloader_signature_method | default('')) | replace('"', '""') }}"
          {% else %}
          {% set gap_family = 'windows' if host in (groups['windows'] | default([])) else 'linux' %}
          {{ host }},{{ gap_family }},"{{ esxi_version | replace('"', '""') }}",,,,,,"",,,""
          {% endif %}
          {% endfor %}

    - name: Show report paths
      ansible.builtin.debug:
        msg:
          - "JSON: {{ report_json }}"
          - "CSV: {{ report_csv }}"
