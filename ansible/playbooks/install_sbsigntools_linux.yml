---
# Standalone: install sbsigntools (sbverify) on Linux guests only.
# secureboot_ca_assessment.yml does not install packages unless -e secureboot_install_sbsigntools=true; use this playbook for a one-off install.
# RHEL + EPEL (opt-in): add -e secureboot_install_epel_for_sbsigntools=true
#
#   cd ansible && VCENTER_CSV=/path/to.csv ansible-playbook playbooks/install_sbsigntools_linux.yml --limit NAME

- name: Install sbsigntools (sbverify) on Linux
  hosts: linux
  gather_facts: true
  become: true
  become_method: "{{ 'su' if (inventory_hostname | lower | regex_search('^sle')) else 'sudo' }}"
  tasks:
    - name: Install sbsigntools packages and verify sbverify
      ansible.builtin.include_tasks: tasks/install_sbsigntools_linux_tasks.yml
