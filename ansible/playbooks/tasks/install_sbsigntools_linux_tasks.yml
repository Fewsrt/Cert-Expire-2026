# Included by secureboot_ca_assessment.yml and install_sbsigntools_linux.yml.
# Requires gather_facts (os_family) on the play.
# Primary: sbsigntools/sbsigntool (sbverify --list). Fallback: pesign (pesign -i file -S) — both from distro packages.
#
# Optional:
#   -e sbsigntools_package_name=...           (force exact package name)
#   -e secureboot_install_epel_for_sbsigntools=true   (always add EPEL on RHEL 8+ before install)
#   -e secureboot_auto_epel_if_sbverify_missing=false   (disable auto EPEL retry when CRB install fails or sbverify absent)

- name: Install sbsigntools package (explicit override)
  ansible.builtin.package:
    name: "{{ sbsigntools_package_name }}"
    state: present
  when: sbsigntools_package_name | default('') | length > 0

# Debian / Ubuntu — refresh cache best-effort, then install without requiring update_cache on the install task
- name: Debian/Ubuntu — apt update (best effort)
  ansible.builtin.apt:
    update_cache: true
  failed_when: false
  changed_when: false
  when:
    - sbsigntools_package_name | default('') | length == 0
    - ansible_facts['os_family'] == 'Debian'

- name: Debian/Ubuntu — apt install sbsigntool
  ansible.builtin.apt:
    name: sbsigntool
    state: present
    update_cache: false
  register: apt_sbsign
  retries: 2
  delay: 3
  until: apt_sbsign is succeeded
  when:
    - sbsigntools_package_name | default('') | length == 0
    - ansible_facts['os_family'] == 'Debian'

# RHEL / Alma / Rocky / Fedora
- name: RedHat — enable CRB / powertools (helps locate sbsigntools)
  ansible.builtin.shell: |
    set +e
    V="{{ ansible_distribution_major_version }}"
    A="{{ ansible_architecture }}"
    if command -v subscription-manager >/dev/null 2>&1; then
      subscription-manager repos --enable "codeready-builder-for-rhel-${V}-${A}-rpms" 2>/dev/null
    fi
    if command -v dnf >/dev/null 2>&1; then
      dnf config-manager --set-enabled crb 2>/dev/null
      dnf config-manager --set-enabled powertools 2>/dev/null
    fi
  args:
    executable: /bin/bash
  failed_when: false
  changed_when: false
  when:
    - sbsigntools_package_name | default('') | length == 0
    - ansible_facts['os_family'] == 'RedHat'

- name: RedHat — dnf install sbsigntools (first attempt; CRB repos)
  ansible.builtin.command:
    argv:
      - dnf
      - install
      - -y
      - sbsigntools
  register: rh_dnf_sbsigntools_try1
  failed_when: false
  changed_when: rh_dnf_sbsigntools_try1.rc == 0
  when:
    - sbsigntools_package_name | default('') | length == 0
    - ansible_facts['os_family'] == 'RedHat'
    - not (secureboot_install_epel_for_sbsigntools | default(false) | bool)

- name: RedHat — install EPEL release when explicitly requested
  ansible.builtin.command:
    argv:
      - bash
      - -lc
      - dnf install -y "https://dl.fedoraproject.org/pub/epel/epel-release-latest-{{ ansible_distribution_major_version }}.noarch.rpm"
  register: rh_epel_explicit
  failed_when: false
  changed_when: rh_epel_explicit.rc == 0
  when:
    - sbsigntools_package_name | default('') | length == 0
    - ansible_facts['os_family'] == 'RedHat'
    - ansible_distribution_major_version | int >= 8
    - secureboot_install_epel_for_sbsigntools | default(false) | bool

- name: RedHat — dnf install sbsigntools (after explicit EPEL)
  ansible.builtin.command:
    argv:
      - dnf
      - install
      - -y
      - sbsigntools
  register: rh_dnf_after_explicit_epel
  failed_when: false
  when:
    - sbsigntools_package_name | default('') | length == 0
    - ansible_facts['os_family'] == 'RedHat'
    - secureboot_install_epel_for_sbsigntools | default(false) | bool

- name: Stat /usr/bin/sbverify after RHEL install attempts
  ansible.builtin.stat:
    path: /usr/bin/sbverify
  register: rh_sbverify_bin
  when:
    - sbsigntools_package_name | default('') | length == 0
    - ansible_facts['os_family'] == 'RedHat'
    - not (secureboot_install_epel_for_sbsigntools | default(false) | bool)

- name: RedHat — auto EPEL + retry when sbverify still missing (default on)
  ansible.builtin.shell: |
    set -e
    dnf install -y "https://dl.fedoraproject.org/pub/epel/epel-release-latest-{{ ansible_distribution_major_version }}.noarch.rpm"
    dnf install -y sbsigntools
  args:
    executable: /bin/bash
  register: rh_auto_epel_retry
  failed_when: false
  changed_when: rh_auto_epel_retry.rc == 0
  when:
    - sbsigntools_package_name | default('') | length == 0
    - ansible_facts['os_family'] == 'RedHat'
    - ansible_distribution_major_version | int >= 8
    - not (secureboot_install_epel_for_sbsigntools | default(false) | bool)
    - secureboot_auto_epel_if_sbverify_missing | default(true) | bool
    - not rh_sbverify_bin.stat.exists | default(true)

- name: SUSE — install sbsigntools (package module)
  ansible.builtin.package:
    name: sbsigntools
    state: present
  when:
    - sbsigntools_package_name | default('') | length == 0
    - ansible_facts['os_family'] == 'Suse'

- name: Other Linux — sbsigntools
  ansible.builtin.package:
    name: sbsigntools
    state: present
  failed_when: false
  when:
    - sbsigntools_package_name | default('') | length == 0
    - ansible_facts['os_family'] not in ['Debian', 'RedHat', 'Suse']

- name: Verify sbverify is on PATH
  ansible.builtin.command:
    argv:
      - bash
      - -lc
      - command -v sbverify
  register: which_sbverify
  changed_when: false
  failed_when: false

- name: Run sbverify --version when present
  ansible.builtin.command:
    argv:
      - bash
      - -lc
      - sbverify --version 2>&1
  register: sbverify_version
  changed_when: false
  failed_when: false
  when: which_sbverify.rc == 0

# When sbverify is still missing, install pesign (same PE/Authenticode ecosystem; used by assessment as fallback reader)
- name: Debian/Ubuntu — apt install pesign (fallback)
  ansible.builtin.apt:
    name: pesign
    state: present
    update_cache: false
  failed_when: false
  when:
    - which_sbverify.rc != 0
    - sbsigntools_package_name | default('') | length == 0
    - ansible_facts['os_family'] == 'Debian'

- name: RedHat — dnf install pesign (fallback)
  ansible.builtin.command:
    argv:
      - dnf
      - install
      - -y
      - pesign
  failed_when: false
  changed_when: false
  when:
    - which_sbverify.rc != 0
    - sbsigntools_package_name | default('') | length == 0
    - ansible_facts['os_family'] == 'RedHat'

- name: SUSE — install pesign (fallback)
  ansible.builtin.package:
    name: pesign
    state: present
  failed_when: false
  when:
    - which_sbverify.rc != 0
    - sbsigntools_package_name | default('') | length == 0
    - ansible_facts['os_family'] == 'Suse'

- name: Other Linux — pesign (fallback)
  ansible.builtin.package:
    name: pesign
    state: present
  failed_when: false
  when:
    - which_sbverify.rc != 0
    - sbsigntools_package_name | default('') | length == 0
    - ansible_facts['os_family'] not in ['Debian', 'RedHat', 'Suse']

- name: Verify pesign is on PATH
  ansible.builtin.command:
    argv:
      - bash
      - -lc
      - command -v pesign
  register: which_pesign
  changed_when: false
  failed_when: false

- name: Report sbverify / pesign availability
  ansible.builtin.debug:
    msg:
      - "{{ 'sbverify: ' ~ which_sbverify.stdout if which_sbverify.rc == 0 else 'sbverify: not on PATH (sbsigntools/sbsigntool)' }}"
      - "{{ 'pesign: ' ~ which_pesign.stdout if which_pesign.rc == 0 else ('pesign: not on PATH — install pesign package for Authenticode fallback' if which_sbverify.rc != 0 else 'pesign: optional (sbverify available)') }}"
