# Included by secureboot_ca_assessment.yml (optional) and install_sbsigntools_linux.yml.
# Requires gather_facts (os_family) on the play.
# Best-effort: missing repos or zypper/dnf modules must not fail the overall assessment.

- name: Install package (explicit -e sbsigntools_package_name=...)
  ansible.builtin.package:
    name: "{{ sbsigntools_package_name }}"
    state: present
  when: sbsigntools_package_name | default('') | length > 0

- name: Debian/Ubuntu — refresh apt cache (best effort)
  ansible.builtin.apt:
    update_cache: true
  failed_when: false
  changed_when: false
  when:
    - sbsigntools_package_name | default('') | length == 0
    - ansible_facts['os_family'] == 'Debian'

- name: Debian/Ubuntu — try package sbsigntools
  ansible.builtin.apt:
    name: sbsigntools
    state: present
    update_cache: false
  register: apt_sbsigntools
  ignore_errors: true
  when:
    - sbsigntools_package_name | default('') | length == 0
    - ansible_facts['os_family'] == 'Debian'

- name: Debian/Ubuntu — fallback package sbsigntool (common on Ubuntu)
  ansible.builtin.apt:
    name: sbsigntool
    state: present
    update_cache: false
  when:
    - sbsigntools_package_name | default('') | length == 0
    - ansible_facts['os_family'] == 'Debian'
    - apt_sbsigntools is failed

- name: RedHat — dnf install sbsigntools (best effort; may need CRB/EPEL)
  ansible.builtin.command:
    argv:
      - bash
      - -lc
      - command -v dnf >/dev/null 2>&1 && dnf install -y sbsigntools || yum install -y sbsigntools
  register: rh_sbsign
  failed_when: false
  changed_when: rh_sbsign.rc == 0
  when:
    - sbsigntools_package_name | default('') | length == 0
    - ansible_facts['os_family'] == 'RedHat'

- name: SUSE — zypper install sbsigntools (best effort)
  ansible.builtin.command:
    argv:
      - zypper
      - --non-interactive
      - install
      - -y
      - sbsigntools
  register: suse_sbsign
  failed_when: false
  changed_when: suse_sbsign.rc == 0
  when:
    - sbsigntools_package_name | default('') | length == 0
    - ansible_facts['os_family'] == 'Suse'

- name: Other Linux — package sbsigntools (best effort)
  ansible.builtin.package:
    name: sbsigntools
    state: present
  register: pkg_other
  failed_when: false
  when:
    - sbsigntools_package_name | default('') | length == 0
    - ansible_facts['os_family'] not in ['Debian', 'RedHat', 'Suse']

- name: Verify sbverify is on PATH
  ansible.builtin.command:
    argv:
      - bash
      - -lc
      - command -v sbverify
  register: which_sbverify
  changed_when: false
  failed_when: false

- name: Run sbverify --version when present
  ansible.builtin.command:
    argv:
      - bash
      - -lc
      - sbverify --version 2>&1
  register: sbverify_version
  changed_when: false
  failed_when: false
  when: which_sbverify.rc == 0

- name: Report sbverify availability
  ansible.builtin.debug:
    msg: "{{ (['sbverify: ' ~ which_sbverify.stdout] + (sbverify_version.stdout_lines | default([]))) if which_sbverify.rc == 0 else ['sbverify not installed; Linux assessment will mark bootloader CA as NEEDS_EVIDENCE until sbsigntools is available.'] }}"
