# Included by secureboot_ca_assessment.yml and install_sbsigntools_linux.yml.
# Requires gather_facts (os_family) on the play.
# One package path per OS family — installs sbsigntools from distro repos only (sbverify for PKCS#7).
# Optional override: -e sbsigntools_package_name=exact-package-name

- name: Install sbsigntools package (explicit override)
  ansible.builtin.package:
    name: "{{ sbsigntools_package_name }}"
    state: present
  when: sbsigntools_package_name | default('') | length > 0

# Debian / Ubuntu — single package name used in practice (universe on Ubuntu if needed)
- name: Debian/Ubuntu — apt install sbsigntool
  ansible.builtin.apt:
    name: sbsigntool
    state: present
    update_cache: true
  when:
    - sbsigntools_package_name | default('') | length == 0
    - ansible_facts['os_family'] == 'Debian'

# RHEL / Alma / Rocky / Fedora — CRB/powertools then dnf install sbsigntools
- name: RedHat — enable CRB / powertools (helps locate sbsigntools)
  ansible.builtin.shell: |
    set +e
    V="{{ ansible_distribution_major_version }}"
    A="{{ ansible_architecture }}"
    if command -v subscription-manager >/dev/null 2>&1; then
      subscription-manager repos --enable "codeready-builder-for-rhel-${V}-${A}-rpms" 2>/dev/null
    fi
    if command -v dnf >/dev/null 2>&1; then
      dnf config-manager --set-enabled crb 2>/dev/null
      dnf config-manager --set-enabled powertools 2>/dev/null
    fi
  args:
    executable: /bin/bash
  failed_when: false
  changed_when: false
  when:
    - sbsigntools_package_name | default('') | length == 0
    - ansible_facts['os_family'] == 'RedHat'

# Without EPEL: vendor repos (CRB above) + sbsigntools
- name: RedHat — install sbsigntools from enabled repos
  ansible.builtin.package:
    name: sbsigntools
    state: present
  failed_when: false
  when:
    - sbsigntools_package_name | default('') | length == 0
    - ansible_facts['os_family'] == 'RedHat'
    - not (secureboot_install_epel_for_sbsigntools | default(false) | bool)

# With EPEL opt-in: one path = EPEL release RPM then same package name
- name: RedHat — install EPEL release (opt-in)
  ansible.builtin.command:
    argv:
      - bash
      - -lc
      - dnf install -y "https://dl.fedoraproject.org/pub/epel/epel-release-latest-{{ ansible_distribution_major_version }}.noarch.rpm"
  register: rh_epel
  failed_when: false
  changed_when: rh_epel.rc == 0
  when:
    - sbsigntools_package_name | default('') | length == 0
    - ansible_facts['os_family'] == 'RedHat'
    - ansible_distribution_major_version | int >= 8
    - secureboot_install_epel_for_sbsigntools | default(false) | bool

- name: RedHat — install sbsigntools (with EPEL available)
  ansible.builtin.package:
    name: sbsigntools
    state: present
  failed_when: false
  when:
    - sbsigntools_package_name | default('') | length == 0
    - ansible_facts['os_family'] == 'RedHat'
    - secureboot_install_epel_for_sbsigntools | default(false) | bool

# SUSE / openSUSE — single zypper install
- name: SUSE — zypper install sbsigntools
  ansible.builtin.command:
    argv:
      - zypper
      - --non-interactive
      - install
      - -y
      - sbsigntools
  register: suse_sbsign
  failed_when: false
  changed_when: suse_sbsign.rc == 0
  when:
    - sbsigntools_package_name | default('') | length == 0
    - ansible_facts['os_family'] == 'Suse'

- name: Other Linux — generic package name sbsigntools
  ansible.builtin.package:
    name: sbsigntools
    state: present
  failed_when: false
  when:
    - sbsigntools_package_name | default('') | length == 0
    - ansible_facts['os_family'] not in ['Debian', 'RedHat', 'Suse']

- name: Verify sbverify is on PATH
  ansible.builtin.command:
    argv:
      - bash
      - -lc
      - command -v sbverify
  register: which_sbverify
  changed_when: false
  failed_when: false

- name: Run sbverify --version when present
  ansible.builtin.command:
    argv:
      - bash
      - -lc
      - sbverify --version 2>&1
  register: sbverify_version
  changed_when: false
  failed_when: false
  when: which_sbverify.rc == 0

- name: Report sbverify availability
  ansible.builtin.debug:
    msg: "{{ (['sbverify: ' ~ which_sbverify.stdout] + (sbverify_version.stdout_lines | default([]))) if which_sbverify.rc == 0 else ['sbverify not on PATH after package install; Linux bootloader PKCS#7 cannot be assessed without the distro sbsigntools/sbsigntool package.'] }}"
